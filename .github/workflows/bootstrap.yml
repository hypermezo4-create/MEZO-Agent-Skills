name: Bootstrap MEZO Agent Skills

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bootstrap.yml"

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild repository archive
        shell: bash
        run: |
          set -euo pipefail
          cat \
            bootstrap/part-00 \
            bootstrap/part-01 \
            bootstrap/part-02 \
            bootstrap/part-03 \
            bootstrap/part-04 \
            bootstrap/part-05a \
            bootstrap/part-05b \
            bootstrap/part-06a \
            bootstrap/part-06b \
            > /tmp/mezo-agent-skills.b64
          base64 --decode /tmp/mezo-agent-skills.b64 > /tmp/mezo-agent-skills.tar.gz
          tar -xzf /tmp/mezo-agent-skills.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Validate extracted repository
        shell: bash
        run: |
          set -euo pipefail
          python validation/validate_structure.py
          python validation/validate_links.py
          python validation/detect_prompt_injection.py
          python validation/validate_routing.py
          python validation/generate_manifest.py --check
          python -m unittest discover -s tests -v
          python -m compileall -q validation tests

      - name: Commit complete repository
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "MEZO Bootstrap Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: build complete MEZO Agent Skills repository"
          git push origin main
