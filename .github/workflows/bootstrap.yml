name: Bootstrap MEZO Agent Skills

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Rebuild and validate repository
        shell: bash
        run: |
          set -euo pipefail
          cat bootstrap/part-00 bootstrap/part-01 bootstrap/part-02 bootstrap/part-03 bootstrap/part-04 bootstrap/part-05a bootstrap/part-05b bootstrap/part-06a bootstrap/part-06b > /tmp/repo.b64
          base64 --decode /tmp/repo.b64 > /tmp/repo.tar.gz
          tar -xzf /tmp/repo.tar.gz -C .
          rm -rf bootstrap .github/workflows/bootstrap.yml
          python validation/validate_structure.py
          python validation/validate_links.py
          python validation/detect_prompt_injection.py
          python validation/validate_routing.py
          python validation/generate_manifest.py --check
          python -m unittest discover -s tests -v
          python -m compileall -q validation tests
      - name: Commit complete repository
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "MEZO Bootstrap Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: build complete MEZO Agent Skills repository"
          git push origin main
