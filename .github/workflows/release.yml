name: Release Skills Manifest

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python validation/validate_repository.py
      - run: python scripts/generate_manifest.py --check
      - uses: actions/upload-artifact@v4
        with:
          name: mezo-agent-skills
          path: |
            skills/
            project_profiles/
            skill-routing.yaml
            skills-manifest.json
            THIRD_PARTY_NOTICES.md
